<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mein Online Shop</title>
  <style>
    body { font-family: Arial; margin:0; background:#f5f5f5; }
    header { background:#111; color:white; padding:15px; text-align:center; }
    .container { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px; padding:20px; }
    .product { background:white; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .product img { width:100%; border-radius:10px; }
    .product h3 { margin:10px 0; }
    .price { color:green; font-weight:bold; }
    button { background:black; color:white; border:none; padding:10px; width:100%; cursor:pointer; border-radius:5px; }
    button:hover { background:#333; }
  </style>
</head>
<body><header>
  <h1>Mein Shop</h1>
  <p>Die besten Produkte online</p>
</header><div class="container">  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Produkt 1">
    <h3>Hoodie</h3>
    <p class="price">39,99€</p>
    <button>Kaufen</button>
  </div>  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Produkt 2">
    <h3>Sneaker</h3>
    <p class="price">79,99€</p>
    <button>Kaufen</button>
  </div>  <div class="product">
    <img src="https://via.placeholder.com/300" alt="Produkt 3">
    <h3>Cap</h3>
    <p class="price">19,99€</p>
    <button>Kaufen</button>
  </div></div></body>
</html>
